<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>按时睡 — 放下手机，好好睡觉</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; }
  body { background:#0a0e2a; color:#e0e0ff; font-family:-apple-system,BlinkMacSystemFont,sans-serif; line-height:1.6; }
  .hero { text-align:center; padding:80px 20px 60px; }
  .hero .moon { font-size:80px; margin-bottom:20px; }
  .hero h1 { font-size:48px; color:#fff; margin-bottom:12px; }
  .hero p { font-size:20px; color:#8899cc; max-width:500px; margin:0 auto; }
  .features { max-width:600px; margin:0 auto; padding:40px 20px; display:flex; flex-direction:column; gap:24px; }
  .feature { background:#111640; border-radius:16px; padding:24px; display:flex; align-items:flex-start; gap:16px; }
  .feature .icon { font-size:32px; min-width:40px; }
  .feature h3 { color:#fff; font-size:18px; margin-bottom:4px; }
  .feature p { color:#8899cc; font-size:15px; }
  .price { text-align:center; padding:40px 20px 60px; }
  .price .tag { display:inline-block; background:#1a2360; color:#ffeb99; font-size:36px; font-weight:bold; padding:12px 32px; border-radius:12px; }
  .footer { text-align:center; padding:40px 20px; color:#445588; font-size:14px; }
  .footer a { color:#6688cc; text-decoration:none; }
  .stars { position:fixed; top:0;left:0;width:100%;height:100%;pointer-events:none; }
  .star { position:absolute; background:#fff; border-radius:50%; opacity:0.3; animation:twinkle 3s infinite; }
  @keyframes twinkle { 0%,100%{opacity:0.2} 50%{opacity:0.6} }
</style>
</head>
<body>
<div class="stars" id="stars"></div>

<div class="hero">
  <div class="moon">🌙</div>
  <h1>按时睡</h1>
  <p>设定就寝时间。到点呼吸引导。放下手机，好好睡觉。</p>
</div>

<div class="features">
  <div class="feature">
    <span class="icon">⏰</span>
    <div><h3>就寝提醒</h3><p>设置你的目标入睡时间，每天到点提醒。</p></div>
  </div>
  <div class="feature">
    <span class="icon">📳</span>
    <div><h3>Haptic 呼吸引导</h3><p>iPhone 按 4-7-8 呼吸法节奏振动，引导你完成三轮深呼吸。</p></div>
  </div>
  <div class="feature">
    <span class="icon">🔒</span>
    <div><h3>隐私安全</h3><p>全部在 iPhone 本地运行。无需联网，零数据收集。</p></div>
  </div>
  <div class="feature">
    <span class="icon">💤</span>
    <div><h3>自然入睡</h3><p>一分钟呼吸放松，身心自然进入睡眠状态。</p></div>
  </div>
</div>

<div class="price">
  <div class="tag">¥3</div>
  <p style="margin-top:12px;color:#8899cc;">一次性购买，永久使用。无订阅，无广告。</p>
</div>

<div class="footer">
  <p>© 2026 Fu Hongtao</p>
  <p style="margin-top:8px;">
    <a href="privacy-pokermind.html">隐私政策</a> &nbsp;·&nbsp;
    <a href="terms-pokermind.html">使用条款</a>
  </p>
</div>

<script>
(function(){
  var s=document.getElementById('stars');
  for(var i=0;i<60;i++){
    var d=document.createElement('div');
    d.className='star';
    d.style.left=Math.random()*100+'%';
    d.style.top=Math.random()*100+'%';
    d.style.width=Math.random()*3+1+'px';
    d.style.height=d.style.width;
    d.style.animationDelay=Math.random()*3+'s';
    s.appendChild(d);
  }
})();
</script>
</body>
</html>
